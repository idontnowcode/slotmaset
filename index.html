<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>속성 뽑기 기계</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Pretendard:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow">Capsule Toy Concept Generator</p>
      <h1>속성 뽑기 기계</h1>
      <p class="description">
        세 대의 뽑기 기계에서 개체 둘과 속성 하나를 뽑아 새로운 이름과 설정을 만들어냅니다.
        세계관, 캐릭터, 몬스터 발상용으로 활용해보세요.
      </p>
    </section>

    <section class="arena-wrap">
      <div class="status-row">
        <div class="display-badge">
          <span class="display-dot"></span>
          <span id="statusPill">READY</span>
        </div>
      </div>

      <div class="table-scene">

        <!-- ═══ Slot Machine Cabinet ═══ -->
        <div class="slot-machine-cabinet">

          <!-- Neon accent strips on sides -->
          <div class="neon-strip neon-strip-l"></div>
          <div class="neon-strip neon-strip-r"></div>

          <!-- Gold top bar with decorative lights -->
          <div class="slot-top-bar">
            <div class="top-bar-lights">
              <span class="t-light"></span><span class="t-light"></span>
              <span class="t-light"></span><span class="t-light"></span>
              <span class="t-light"></span><span class="t-light"></span>
              <span class="t-light"></span><span class="t-light"></span>
              <span class="t-light"></span>
            </div>
          </div>

          <!-- Reel panel (three reels + gold dividers) -->
          <div class="gacha-arena" aria-label="속성을 뽑는 뽑기 기계 세 대">

            <!-- Machine 1: 개체 1 -->
            <div class="machine-col" id="machine1"
                 style="--mc:#4eb8d4;--mc-deep:#1a6e8a;--mc-glow:rgba(78,184,212,0.55)">
              <div class="reel-label">개체 1</div>
              <div class="gacha-dome" id="dome1">
                <div class="reel-gloss"></div>
                <div class="reel-gloss reel-gloss-2"></div>
                <span class="gacha-item" id="gacha1"></span>
              </div>
              <div class="knob-section">
                <div class="knob-assy">
                  <div class="knob-base"></div>
                  <div class="knob-dial"><div class="knob-mark"></div></div>
                </div>
              </div>
              <div class="gacha-tray">
                <div class="tray-hole"></div>
                <div class="gacha-ball"></div>
              </div>
              <button class="machine-spin-btn" id="spinBtn1" type="button">뽑기</button>
            </div>

            <div class="reel-divider"></div>

            <!-- Machine 2: 개체 2 -->
            <div class="machine-col" id="machine2"
                 style="--mc:#3db88a;--mc-deep:#145c42;--mc-glow:rgba(61,184,138,0.55)">
              <div class="reel-label">개체 2</div>
              <div class="gacha-dome" id="dome2">
                <div class="reel-gloss"></div>
                <div class="reel-gloss reel-gloss-2"></div>
                <span class="gacha-item" id="gacha2"></span>
              </div>
              <div class="knob-section">
                <div class="knob-assy">
                  <div class="knob-base"></div>
                  <div class="knob-dial"><div class="knob-mark"></div></div>
                </div>
              </div>
              <div class="gacha-tray">
                <div class="tray-hole"></div>
                <div class="gacha-ball"></div>
              </div>
              <button class="machine-spin-btn" id="spinBtn2" type="button">뽑기</button>
            </div>

            <div class="reel-divider"></div>

            <!-- Machine 3: 속성 -->
            <div class="machine-col" id="machine3"
                 style="--mc:#d4a73a;--mc-deep:#7a520e;--mc-glow:rgba(212,167,58,0.55)">
              <div class="reel-label">속성</div>
              <div class="gacha-dome" id="dome3">
                <div class="reel-gloss"></div>
                <div class="reel-gloss reel-gloss-2"></div>
                <span class="gacha-item" id="gacha3"></span>
              </div>
              <div class="knob-section">
                <div class="knob-assy">
                  <div class="knob-base"></div>
                  <div class="knob-dial"><div class="knob-mark"></div></div>
                </div>
              </div>
              <div class="gacha-tray">
                <div class="tray-hole"></div>
                <div class="gacha-ball"></div>
              </div>
              <button class="machine-spin-btn" id="spinBtn3" type="button">뽑기</button>
            </div>

          </div><!-- /gacha-arena -->

          <!-- Lower display cavity (matches image reference) -->
          <div class="slot-lower-section">
            <div class="lower-inner"></div>
          </div>

          <!-- Gold bottom bar with lights -->
          <div class="slot-bottom-bar">
            <div class="bottom-bar-lights">
              <span class="b-light"></span><span class="b-light"></span>
              <span class="b-light"></span><span class="b-light"></span>
              <span class="b-light"></span><span class="b-light"></span>
              <span class="b-light"></span>
            </div>
          </div>

        </div><!-- /slot-machine-cabinet -->

        <!-- Shared wooden ball receiver -->
        <div class="wood-tray">
          <div class="tray-slot"
               style="--mc:#4eb8d4;--mc-deep:#1a6e8a;--mc-glow:rgba(78,184,212,0.55)">
            <div class="ball-in-catcher" id="catcher1"></div>
          </div>
          <div class="tray-slot"
               style="--mc:#3db88a;--mc-deep:#145c42;--mc-glow:rgba(61,184,138,0.55)">
            <div class="ball-in-catcher" id="catcher2"></div>
          </div>
          <div class="tray-slot"
               style="--mc:#d4a73a;--mc-deep:#7a520e;--mc-glow:rgba(212,167,58,0.55)">
            <div class="ball-in-catcher" id="catcher3"></div>
          </div>
        </div>

        <div class="table-edge"></div>
      </div><!-- /table-scene -->

      <div class="control-deck">
        <div class="controls">
          <button class="open-button" id="openButton" type="button" disabled>Open</button>
          <button class="ghost-button" id="replayButton" type="button">결과 다시 보기</button>
        </div>

        <section class="result-card" aria-live="polite">
          <p class="result-label">RESULT</p>
          <h3 id="resultHeadline">각 기계의 뽑기 버튼을 눌러보세요.</h3>
          <p id="resultSentence">세 기계를 모두 뽑은 후 Open 버튼을 누르세요.</p>
        </section>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
